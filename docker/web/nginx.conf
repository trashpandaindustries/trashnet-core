server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Any route that doesn't have a file extension (e.g. /login, /dashboard)
    # should serve index.html to allow React Router to handle it
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets
    location ~* \.(?:css|js|jpg|svg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
